<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemExam — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-slate-900 to-blue-950 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-2xl mb-4">
          <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
        <p class="text-slate-500 text-sm mt-1">Students: your email must be approved by your teacher</p>
      </div>

      <form id="regForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Full name</label>
          <input type="text" id="name" required
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800"
            placeholder="Your full name">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input type="email" id="email" required autocomplete="email"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800"
            placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" id="password" required minlength="6"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800"
            placeholder="At least 6 characters">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Confirm password</label>
          <input type="password" id="confirm" required
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800"
            placeholder="Re-enter your password">
        </div>

        <div id="statusMsg" class="hidden text-sm px-4 py-3 rounded-xl"></div>

        <button type="submit" id="submitBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors">
          Create Account
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a href="index.html" class="text-indigo-600 font-semibold hover:underline">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    // Pre-fill email from URL param
    const urlEmail = new URLSearchParams(window.location.search).get('email');
    if (urlEmail) {
      document.getElementById('email').value = urlEmail;
      document.getElementById('email').readOnly = true;
    }

    function showStatus(msg, type = 'error') {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = type === 'error'
        ? 'block bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl'
        : 'block bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-3 rounded-xl';
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn   = document.getElementById('submitBtn');
      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pw    = document.getElementById('password').value;
      const pw2   = document.getElementById('confirm').value;

      if (pw !== pw2) { showStatus('Passwords do not match.'); return; }

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      let cred = null;
      try {
        // Step 1: Create Firebase Auth account first (so we're authenticated for Firestore reads)
        cred = await auth.createUserWithEmailAndPassword(email, pw);

        // Step 2: Now authenticated — determine role
        let role = null;
        let whitelistDocId = null;

        if (email === TEACHER_EMAIL.toLowerCase()) {
          role = 'teacher';
        } else {
          // Student: check whitelist (now authenticated, rules allow this read)
          const wSnap = await db.collection('exam_whitelist')
            .where('email', '==', email).limit(1).get();
          if (wSnap.empty) {
            await cred.user.delete(); // clean up auth account
            showStatus('Your email is not on the approved list. Ask your teacher to add you first.');
            btn.disabled = false; btn.textContent = 'Create Account'; return;
          }
          const wDoc = wSnap.docs[0];
          if (wDoc.data().registered) {
            await cred.user.delete();
            showStatus('This email already has an account. Try signing in.');
            btn.disabled = false; btn.textContent = 'Create Account'; return;
          }
          role = 'student';
          whitelistDocId = wDoc.id;
        }

        // Step 3: Write user profile
        await db.collection('exam_users').doc(cred.user.uid).set({
          name, email, role,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Step 4: Mark whitelist entry as registered
        if (whitelistDocId) {
          await db.collection('exam_whitelist').doc(whitelistDocId).update({
            registered: true,
            userId: cred.user.uid
          });
        }

        showStatus('Account created! Redirecting…', 'success');
        setTimeout(() => {
          window.location.href = role === 'teacher' ? 'teacher/index.html' : 'student/index.html';
        }, 1000);

      } catch (ex) {
        // If auth account was created but Firestore write failed, clean up
        if (cred?.user && ex.code !== 'auth/email-already-in-use') {
          try { await cred.user.delete(); } catch (_) {}
        }
        const friendly = {
          'auth/email-already-in-use': 'An account with this email already exists. Try signing in.',
          'auth/weak-password': 'Password is too weak. Use at least 6 characters.',
          'auth/invalid-email': 'Invalid email address.',
        };
        showStatus(friendly[ex.code] || ex.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
