<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdvantaLS — Exam</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nuc { display:inline-flex; flex-direction:column; font-size:0.85em; line-height:1.1; vertical-align:0.22em; margin:0 0.07em; text-align:center; }
    .nuc span { line-height:1.05; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
</head>
<body class="min-h-screen bg-slate-100">

  <!-- Sticky header with timer -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 id="examTitle" class="font-bold text-slate-800">Loading exam…</h1>
        <p id="examMeta" class="text-slate-400 text-xs mt-0.5"></p>
      </div>
      <div class="flex items-center gap-4">
        <div id="timerBox" class="hidden flex items-center gap-2 px-4 py-2 bg-amber-50 border border-amber-200 rounded-xl">
          <svg class="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span id="timerText" class="font-mono font-bold text-amber-700 text-sm"></span>
        </div>
        <button onclick="confirmSubmit()"
          class="px-5 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 transition-colors" id="submitBtn">
          Submit Exam
        </button>
        <button onclick="window.close()" id="exitPreviewBtn"
          class="hidden px-5 py-2.5 bg-slate-600 text-white rounded-xl text-sm font-semibold hover:bg-slate-700 transition-colors">
          ← Exit Preview
        </button>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="h-1 bg-slate-100">
      <div id="progressBar" class="h-1 bg-indigo-500 transition-all" style="width:0%"></div>
    </div>
  </nav>

  <!-- Preview mode banner -->
  <div id="previewBanner" class="hidden bg-amber-50 border-b border-amber-200 px-6 py-2.5 text-center">
    <span class="text-amber-700 text-sm font-semibold">Preview Mode</span>
    <span class="text-amber-600 text-sm"> — this is exactly what students see. No answers will be saved.</span>
  </div>

  <!-- Loading state -->
  <div id="loadingState" class="max-w-3xl mx-auto px-6 py-16 text-center text-slate-400">
    <div class="animate-pulse text-lg">Loading exam questions…</div>
  </div>

  <!-- Questions -->
  <div id="questionsContainer" class="hidden max-w-3xl mx-auto px-6 py-8 space-y-6 pb-24"></div>

  <!-- Submit Confirmation Modal -->
  <div id="confirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="text-center mb-5">
        <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h3 class="text-xl font-bold text-slate-800">Submit exam?</h3>
        <p id="confirmText" class="text-slate-500 text-sm mt-2"></p>
      </div>
      <div class="flex gap-3">
        <button onclick="document.getElementById('confirmModal').classList.add('hidden')"
          class="flex-1 py-3 border border-slate-200 text-slate-600 rounded-xl font-semibold hover:bg-slate-50">
          Continue answering
        </button>
        <button onclick="submitExam()"
          class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors" id="confirmBtn">
          Submit now
        </button>
      </div>
    </div>
  </div>

<script>
  const paperId   = new URLSearchParams(window.location.search).get('paperId');
  const isPreview = new URLSearchParams(window.location.search).get('preview') === 'true';
  let currentUser = null;
  let currentUserData = null;
  let paper       = null;
  let questions   = [];
  let answers     = {};    // {qId: {answer: string, imageFile?: File, imageUrl?: string}}
  let timerInterval = null;
  let secondsLeft = null;

  function renderChemText(s) {
    return String(s || '')
      .replace(/\{(\w+)\|(\w+)\}/g, (_, top, bot) =>
        `<span class="nuc"><span>${top}</span><span>${bot}</span></span>`)
      .replace(/\^{([^}]+)}/g, (_, c) => `<sup>${c}</sup>`)
      .replace(/_{([^}]+)}/g,  (_, c) => `<sub>${c}</sub>`);
  }

  if (isPreview) {
    document.getElementById('previewBanner').classList.remove('hidden');
    document.getElementById('submitBtn').classList.add('hidden');
    document.getElementById('exitPreviewBtn').classList.remove('hidden');
  }

  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = '../index.html'; return; }
    const snap = await db.collection('exam_users').doc(user.uid).get();
    if (!snap.exists) { window.location.href = '../index.html'; return; }
    const role = snap.data().role;

    if (isPreview) {
      if (role !== 'teacher') { window.location.href = '../index.html'; return; }
      if (!paperId) { alert('No paper specified.'); return; }
      loadExam();
      return;
    }

    if (role !== 'student') { window.location.href = '../index.html'; return; }
    currentUser     = user;
    currentUserData = snap.data();

    if (!paperId) { alert('No paper specified.'); return; }

    // Check already submitted
    const existing = await db.collection('exam_submissions')
      .where('studentId', '==', user.uid)
      .where('paperId', '==', paperId).limit(1).get();
    if (!existing.empty) {
      alert('You have already submitted this exam. Check My Results for your score.');
      window.location.href = 'index.html';
      return;
    }

    loadExam();
  });

  async function loadExam() {
    const paperSnap = await db.collection('exam_papers').doc(paperId).get();
    if (!paperSnap.exists) { alert('Paper not found.'); return; }
    paper = { id: paperId, ...paperSnap.data() };

    document.getElementById('examTitle').textContent = paper.title;
    document.getElementById('examMeta').textContent =
      `${paper.questionIds?.length || 0} questions · ${paper.totalMarks || 0} marks${paper.duration ? ` · ${paper.duration} min` : ''}`;

    if (paper.duration) startTimer(paper.duration * 60);

    // Load questions in order
    const qSnaps = await Promise.all((paper.questionIds || []).map(id =>
      db.collection('exam_questions').doc(id).get()
    ));
    questions = qSnaps.filter(s => s.exists).map(s => ({ id: s.id, ...s.data() }));

    renderQuestions();
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('questionsContainer').classList.remove('hidden');
  }

  function renderQuestions() {
    const container = document.getElementById('questionsContainer');
    container.innerHTML = questions.map((q, idx) => {
      const num = idx + 1;
      if (q.type === 'mcq') {
        return `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6" id="q-${q.id}">
            <div class="flex items-start justify-between gap-4 mb-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-2">
                  <span class="w-7 h-7 bg-indigo-100 text-indigo-700 rounded-lg text-xs font-bold flex items-center justify-center flex-shrink-0">${num}</span>
                  <span class="text-xs font-semibold text-blue-600 uppercase tracking-wide">Multiple Choice</span>
                </div>
                <div class="text-slate-800 font-medium leading-relaxed">${renderChemText(q.questionText)}</div>
              </div>
              <span class="flex-shrink-0 text-xs text-slate-400 font-medium">${q.totalMarks || 1} mark${(q.totalMarks||1)>1?'s':''}</span>
            </div>
            ${q.imageUrl ? `<img src="${q.imageUrl}" class="mb-4 max-h-48 rounded-xl border border-slate-200 object-contain w-full">` : ''}
            <div class="space-y-2" id="opts-${q.id}">
              ${['A','B','C','D'].map(letter => `
                <label class="flex items-start gap-3 p-3.5 rounded-xl border border-slate-200 cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 transition-all has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50 group" id="opt-${q.id}-${letter}">
                  <input type="radio" name="mcq-${q.id}" value="${letter}" onchange="selectMCQ('${q.id}', '${letter}')"
                    class="w-4 h-4 text-indigo-600 flex-shrink-0 mt-0.5">
                  <span class="w-6 h-6 rounded-lg bg-slate-100 text-slate-600 text-xs font-bold flex items-center justify-center flex-shrink-0 group-has-[:checked]:bg-indigo-100 group-has-[:checked]:text-indigo-700">${letter}</span>
                  <div class="flex-1 min-w-0">
                    ${q.options?.[letter] ? `<span class="text-sm text-slate-700">${renderChemText(q.options[letter])}</span>` : ''}
                    ${q.optionImages?.[letter] ? `<img src="${q.optionImages[letter]}" class="mt-1 max-h-24 rounded-lg border border-slate-200 object-contain">` : ''}
                  </div>
                </label>`).join('')}
            </div>
            <div id="answered-${q.id}" class="hidden mt-3 flex items-center gap-2 text-emerald-600 text-xs font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              Answer selected
            </div>
          </div>`;
      } else {
        // Structured question
        return `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6" id="q-${q.id}">
            <div class="flex items-start justify-between gap-4 mb-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-2">
                  <span class="w-7 h-7 bg-purple-100 text-purple-700 rounded-lg text-xs font-bold flex items-center justify-center flex-shrink-0">${num}</span>
                  <span class="text-xs font-semibold text-purple-600 uppercase tracking-wide">Structured</span>
                </div>
                <div class="text-slate-800 font-medium leading-relaxed">${renderChemText(q.questionText)}</div>
              </div>
              <span class="flex-shrink-0 text-xs text-slate-400 font-medium">${q.totalMarks} mark${q.totalMarks>1?'s':''}</span>
            </div>
            ${q.imageUrl ? `<img src="${q.imageUrl}" class="mb-4 max-h-48 rounded-xl border border-slate-200 object-contain w-full">` : ''}
            <textarea id="ans-${q.id}" rows="5" placeholder="Write your answer here…"
              oninput="updateStructured('${q.id}', this.value)"
              class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm resize-y"></textarea>
            ${q.allowImageUpload ? `
              <div class="mt-3">
                <label class="block text-xs font-medium text-slate-500 mb-1.5">Attach an image (optional)</label>
                <div id="imgUploadArea-${q.id}" onclick="document.getElementById('imgFile-${q.id}').click()"
                  class="border-2 border-dashed border-slate-200 rounded-xl p-4 text-center cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 transition-all">
                  <svg class="w-6 h-6 text-slate-300 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                  </svg>
                  <p class="text-xs text-slate-400">Click to attach image</p>
                </div>
                <input type="file" id="imgFile-${q.id}" accept="image/*" class="hidden" onchange="attachImage('${q.id}', this)">
                <div id="imgPreview-${q.id}" class="hidden mt-2 relative inline-block">
                  <img id="imgPrev-${q.id}" class="max-h-32 rounded-xl border border-slate-200 object-contain">
                  <button type="button" onclick="removeImage('${q.id}')"
                    class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full text-xs font-bold hover:bg-red-600 flex items-center justify-center">✕</button>
                </div>
              </div>` : ''}
          </div>`;
      }
    }).join('');
    updateProgress();
  }

  function selectMCQ(qId, letter) {
    if (!answers[qId]) answers[qId] = { type: 'mcq' };
    answers[qId].answer = letter;
    document.getElementById(`answered-${qId}`).classList.remove('hidden');
    updateProgress();
  }

  function updateStructured(qId, text) {
    if (!answers[qId]) answers[qId] = { type: 'structured' };
    answers[qId].answer = text;
    updateProgress();
  }

  function attachImage(qId, input) {
    if (!input.files[0]) return;
    if (!answers[qId]) answers[qId] = { type: 'structured', answer: '' };
    answers[qId].imageFile = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById(`imgPrev-${qId}`).src = e.target.result;
      document.getElementById(`imgPreview-${qId}`).classList.remove('hidden');
      document.getElementById(`imgUploadArea-${qId}`).classList.add('hidden');
    };
    reader.readAsDataURL(input.files[0]);
  }

  function removeImage(qId) {
    if (answers[qId]) delete answers[qId].imageFile;
    document.getElementById(`imgFile-${qId}`).value = '';
    document.getElementById(`imgPreview-${qId}`).classList.add('hidden');
    document.getElementById(`imgUploadArea-${qId}`).classList.remove('hidden');
  }

  function updateProgress() {
    const answered = questions.filter(q => answers[q.id]?.answer?.trim()).length;
    const pct = Math.round((answered / questions.length) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
  }

  function startTimer(seconds) {
    secondsLeft = seconds;
    const box  = document.getElementById('timerBox');
    const text = document.getElementById('timerText');
    box.classList.remove('hidden');
    timerInterval = setInterval(() => {
      secondsLeft--;
      const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
      const s = String(secondsLeft % 60).padStart(2, '0');
      text.textContent = `${m}:${s}`;
      if (secondsLeft <= 300) {
        box.classList.add('border-red-400', 'bg-red-50');
        box.classList.remove('border-amber-200', 'bg-amber-50');
        text.classList.add('text-red-700');
        text.classList.remove('text-amber-700');
      }
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        alert('Time is up! Your exam will be submitted automatically.');
        submitExam();
      }
    }, 1000);
  }

  function confirmSubmit() {
    const answered  = questions.filter(q => answers[q.id]?.answer?.trim()).length;
    const total     = questions.length;
    const unanswered = total - answered;
    document.getElementById('confirmText').textContent =
      unanswered > 0
        ? `You have answered ${answered} of ${total} questions. ${unanswered} question${unanswered>1?'s':''} left unanswered.`
        : `All ${total} questions answered. Ready to submit!`;
    document.getElementById('confirmModal').classList.remove('hidden');
  }

  async function submitExam() {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true; btn.textContent = 'Submitting…';
    clearInterval(timerInterval);

    try {
      // Upload any student images first
      const uploadPromises = questions.map(async (q) => {
        const ans = answers[q.id];
        if (ans?.imageFile) {
          const path = `exam-images/answers/${paperId}/${currentUser.uid}/${q.id}_${Date.now()}`;
          const ref  = storage.ref(path);
          await ref.put(ans.imageFile);
          ans.imageUrl = await ref.getDownloadURL();
          delete ans.imageFile;
        }
      });
      await Promise.all(uploadPromises);

      // Auto-mark MCQ
      let mcqScore = 0;
      let mcqTotal = 0;
      questions.forEach(q => {
        if (q.type === 'mcq') {
          mcqTotal += q.totalMarks || 1;
          if (answers[q.id]?.answer === q.correctAnswer) mcqScore += q.totalMarks || 1;
        }
      });

      const structuredTotal = questions
        .filter(q => q.type === 'structured')
        .reduce((s, q) => s + (q.totalMarks || 1), 0);

      // Build submission answers object (no File objects)
      const cleanAnswers = {};
      questions.forEach(q => {
        if (answers[q.id]) {
          cleanAnswers[q.id] = {
            type:     q.type,
            answer:   answers[q.id].answer || '',
            imageUrl: answers[q.id].imageUrl || null,
          };
        } else {
          cleanAnswers[q.id] = { type: q.type, answer: '', imageUrl: null };
        }
      });

      // Check if any structured questions (needs teacher marking)
      const hasStructured = questions.some(q => q.type === 'structured');

      await db.collection('exam_submissions').add({
        paperId,
        paperTitle:    paper.title,
        studentId:     currentUser.uid,
        studentName:   currentUserData.name,
        studentEmail:  currentUser.email,
        answers:       cleanAnswers,
        mcqScore,
        mcqTotal,
        structuredTotal,
        totalPossible: paper.totalMarks,
        // If no structured questions, auto-complete the marking
        totalAwarded:  hasStructured ? null : mcqScore,
        status:        hasStructured ? 'submitted' : 'marked',
        structuredMarks: hasStructured ? null : {},
        submittedAt:   firebase.firestore.FieldValue.serverTimestamp(),
        markedAt:      hasStructured ? null : firebase.firestore.FieldValue.serverTimestamp(),
      });

      // Show success
      document.getElementById('confirmModal').innerHTML = `
        <div class="p-8 text-center">
          <div class="w-16 h-16 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <h3 class="text-xl font-bold text-slate-800 mb-2">Submitted!</h3>
          ${hasStructured
            ? '<p class="text-slate-500 text-sm">Your MCQ answers were auto-marked. Structured questions will be marked by your teacher soon.</p>'
            : `<p class="text-slate-500 text-sm">Your score: <strong>${mcqScore}/${mcqTotal}</strong></p>`}
          <div class="mt-4 p-3 bg-slate-50 rounded-xl text-sm text-slate-600">
            MCQ: <strong>${mcqScore}/${mcqTotal}</strong>
          </div>
          <a href="index.html" class="mt-5 inline-block px-6 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition-colors">
            Back to My Exams
          </a>
        </div>`;

    } catch (ex) {
      alert('Error submitting: ' + ex.message);
      btn.disabled = false; btn.textContent = 'Submit now';
    }
  }
</script>
</body>
</html>
