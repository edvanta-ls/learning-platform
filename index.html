<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemExam — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-950 via-slate-900 to-blue-950 flex items-center justify-center p-4">

  <!-- background molecules decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-5">
    <svg class="absolute top-10 left-10 w-64 h-64 text-indigo-400" viewBox="0 0 200 200" fill="currentColor">
      <circle cx="100" cy="50" r="20"/><circle cx="50" cy="130" r="20"/><circle cx="150" cy="130" r="20"/>
      <line x1="100" y1="70" x2="50" y2="110" stroke="currentColor" stroke-width="4"/>
      <line x1="100" y1="70" x2="150" y2="110" stroke="currentColor" stroke-width="4"/>
      <line x1="50" y1="150" x2="150" y2="150" stroke="currentColor" stroke-width="4"/>
    </svg>
  </div>

  <div class="relative w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <!-- Brand -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 rounded-2xl mb-4">
          <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.347.318A3.5 3.5 0 0112 19.5a3.5 3.5 0 01-2.474-1.026l-.347-.318z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">ChemExam</h1>
        <p class="text-slate-500 text-sm mt-1">Chemistry Exam Platform</p>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
          <input type="email" id="email" required autocomplete="email"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 placeholder-slate-400"
            placeholder="you@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" required autocomplete="current-password"
              class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 placeholder-slate-400 pr-12"
              placeholder="••••••••">
            <button type="button" onclick="togglePw()" tabindex="-1"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl"></div>

        <button type="submit" id="submitBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
          Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-slate-200"></div>
        <span class="text-slate-400 text-xs">or</span>
        <div class="flex-1 h-px bg-slate-200"></div>
      </div>

      <!-- Google Sign-In -->
      <button id="googleBtn" onclick="signInWithGoogle()"
        class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors font-medium text-slate-700">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <p class="text-center text-sm text-slate-500 mt-5">
        New student?
        <a href="register.html" class="text-indigo-600 font-semibold hover:underline">Register here</a>
      </p>
    </div>
  </div>

  <script>
    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    auth.onAuthStateChanged(async (user) => {
      if (!user) return;
      const doc = await db.collection('exam_users').doc(user.uid).get();
      if (doc.exists) {
        const r = doc.data().role;
        window.location.href = r === 'teacher' ? 'teacher/index.html' : 'student/index.html';
      }
    });

    async function signInWithGoogle() {
      const btn = document.getElementById('googleBtn');
      const err = document.getElementById('errorMsg');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = `<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg> Signing in…`;

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const cred     = await auth.signInWithPopup(provider);
        const email    = cred.user.email.toLowerCase();
        let snap       = await db.collection('exam_users').doc(cred.user.uid).get();

        if (!snap.exists) {
          // First Google sign-in — create profile
          if (email === TEACHER_EMAIL.toLowerCase()) {
            await db.collection('exam_users').doc(cred.user.uid).set({
              name: cred.user.displayName || 'Teacher',
              email, role: 'teacher',
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.location.href = 'teacher/index.html'; return;
          }
          // Student: check whitelist
          const wSnap = await db.collection('exam_whitelist')
            .where('email', '==', email).limit(1).get();
          if (wSnap.empty) {
            await auth.signOut();
            err.textContent = 'Your Google account is not on the approved list. Contact your teacher.';
            err.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
            return;
          }
          const wDoc = wSnap.docs[0];
          await db.collection('exam_users').doc(cred.user.uid).set({
            name: cred.user.displayName || wDoc.data().name,
            email, role: 'student',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          await db.collection('exam_whitelist').doc(wDoc.id).update({
            registered: true, userId: cred.user.uid
          });
          window.location.href = 'student/index.html'; return;
        }

        const role = snap.data().role;
        window.location.href = role === 'teacher' ? 'teacher/index.html' : 'student/index.html';

      } catch (ex) {
        if (ex.code !== 'auth/popup-closed-by-user') {
          err.textContent = ex.message;
          err.classList.remove('hidden');
        }
        btn.disabled = false;
        btn.innerHTML = `<svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.77c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/></svg> Signing in…';

      try {
        const email    = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const cred = await auth.signInWithEmailAndPassword(email, password);
        let doc  = await db.collection('exam_users').doc(cred.user.uid).get();

        // Recovery: auth account exists but Firestore profile is missing (e.g. interrupted registration)
        if (!doc.exists) {
          if (email === TEACHER_EMAIL.toLowerCase()) {
            // Auto-recreate teacher profile
            await db.collection('exam_users').doc(cred.user.uid).set({
              name: 'Teacher', email, role: 'teacher',
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            window.location.href = 'teacher/index.html'; return;
          }
          throw new Error('Account not set up. Contact your teacher.');
        }

        const role = doc.data().role;
        window.location.href = role === 'teacher' ? 'teacher/index.html' : 'student/index.html';
      } catch (ex) {
        const friendly = {
          'auth/wrong-password': 'Incorrect password.',
          'auth/user-not-found': 'No account with that email.',
          'auth/invalid-email':  'Invalid email address.',
          'auth/too-many-requests': 'Too many attempts. Try again later.',
        };
        err.textContent = friendly[ex.code] || ex.message;
        err.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
