<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdvantaLS — Papers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/teacher-nav.js"></script>
</head>
<body class="bg-slate-100">
<div class="flex h-screen">
  <aside id="teacher-sidebar" class="w-64 flex-shrink-0 hidden md:block"></aside>
  <main class="flex-1 overflow-auto">
    <div class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between">
      <h2 class="text-xl font-bold text-slate-800">Exam Papers</h2>
      <button onclick="openCreateModal()"
        class="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-semibold transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Create Paper
      </button>
    </div>

    <div class="p-8">
      <div id="papersList" class="space-y-4">
        <div class="bg-white rounded-2xl p-8 text-center text-slate-400 text-sm shadow-sm">Loading…</div>
      </div>
    </div>
  </main>
</div>

<!-- Create / Edit Paper Modal -->
<div id="paperModal" class="hidden fixed inset-0 bg-black/50 flex items-start justify-center z-50 p-4 overflow-y-auto">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl my-8">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h3 id="paperModalTitle" class="text-lg font-semibold text-slate-800">Create Paper</h3>
      <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Paper title</label>
          <input type="text" id="pTitle"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm"
            placeholder="e.g. Organic Chemistry — Topic Test 1">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Duration (minutes, optional)</label>
          <input type="number" id="pDuration" min="5" placeholder="e.g. 45"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm">
        </div>
      </div>

      <!-- Quick Add: whole set -->
      <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4 space-y-2">
        <p class="text-sm font-medium text-indigo-700">Quick add — entire question set</p>
        <div class="flex items-center gap-2">
          <select id="quickTopicSel" onchange="onQuickTopicChange()"
            class="flex-1 px-3 py-2 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none bg-white">
            <option value="">Select topic…</option>
          </select>
          <select id="quickSetSel"
            class="flex-1 px-3 py-2 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none bg-white">
            <option value="">Select set…</option>
          </select>
          <button onclick="addWholeSet()"
            class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-sm font-semibold hover:bg-indigo-700 whitespace-nowrap">
            + Add set
          </button>
        </div>
      </div>

      <!-- Individual question picker -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-slate-700">Or pick individual questions</label>
          <select id="pTopicFilter" onchange="filterModalQuestions()"
            class="px-3 py-1.5 border border-slate-200 rounded-xl text-xs text-slate-600 focus:outline-none bg-white">
            <option value="">All topics</option>
          </select>
        </div>
        <div id="questionPicker" class="border border-slate-200 rounded-xl max-h-52 overflow-y-auto divide-y divide-slate-100">
          <div class="p-4 text-center text-slate-400 text-sm">Loading questions…</div>
        </div>
        <p class="text-xs text-slate-400 mt-1.5">
          Selected: <span id="selectedCount" class="font-semibold text-indigo-600">0</span> questions
          · <span id="selectedMarks" class="font-semibold text-indigo-600">0</span> total marks
        </p>
      </div>

      <!-- Assign to students (optional) -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="block text-sm font-medium text-slate-700">Assign to students <span class="text-slate-400 font-normal">(optional — leave blank for all registered students)</span></label>
          <label class="flex items-center gap-2 cursor-pointer text-xs text-slate-600">
            <input type="checkbox" id="assignAll" onchange="toggleAssignAll()" class="w-4 h-4 text-indigo-600 rounded">
            All students
          </label>
        </div>
        <div id="studentPicker" class="border border-slate-200 rounded-xl max-h-36 overflow-y-auto divide-y divide-slate-100">
          <div class="p-4 text-center text-slate-400 text-sm">Loading students…</div>
        </div>
      </div>

      <!-- PDF attachment -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Attach paper PDF <span class="text-slate-400 font-normal">(optional — students can view before questions are set up)</span></label>
        <div class="space-y-2">
          <div class="flex items-center gap-2">
            <label class="flex-1 flex items-center gap-2 px-4 py-2.5 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 text-sm text-slate-600">
              <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
              </svg>
              <span id="pdfFileName">Upload PDF file…</span>
              <input type="file" id="pdfFileInput" accept=".pdf,application/pdf" class="hidden" onchange="onPdfFileChange(this)">
            </label>
            <span class="text-slate-400 text-sm">or</span>
            <input type="url" id="pdfLink" placeholder="Paste Google Drive / URL link…"
              class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm">
          </div>
          <div id="pdfCurrentWrap" class="hidden flex items-center gap-2 text-xs text-slate-500">
            <svg class="w-4 h-4 text-red-500" fill="currentColor" viewBox="0 0 20 20">
              <path d="M4 18h12V8l-4-4H4v14zM9 9h2v4H9V9zm0 6h2v2H9v-2z"/>
            </svg>
            <span id="pdfCurrentLabel"></span>
            <button onclick="clearPdf()" class="text-red-500 hover:underline ml-1">Remove</button>
          </div>
        </div>
      </div>

      <div id="pError" class="hidden text-sm text-red-600 bg-red-50 px-4 py-3 rounded-xl"></div>

      <div class="flex gap-3 pt-2">
        <button onclick="closeCreateModal()"
          class="flex-1 py-3 border border-slate-200 text-slate-600 rounded-xl font-semibold hover:bg-slate-50 text-sm">Cancel</button>
        <button onclick="savePaper('draft')"
          class="px-6 py-3 border border-slate-300 text-slate-700 rounded-xl font-semibold hover:bg-slate-50 text-sm">Save as Draft</button>
        <button onclick="savePaper('published')"
          class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 text-sm transition-colors" id="saveBtn">
          Publish Paper
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let allQuestions = [];
  let allTopics    = [];
  let allSets      = [];
  let allStudents  = [];
  let editingPaperId  = null;
  let selectedQIds    = new Set();
  let selectedSIds    = new Set();
  let pendingPdfFile  = null;   // File object waiting to upload
  let existingPdfUrl  = null;   // URL already stored on the paper

  initTeacherPage('papers').then(() => {
    loadMarkingBadge();
    loadPapers();
  });

  // ── Paper list ────────────────────────────────────────────────────
  async function loadPapers() {
    const snap = await db.collection('exam_papers').orderBy('createdAt', 'desc').get();
    const el   = document.getElementById('papersList');
    if (snap.empty) {
      el.innerHTML = '<div class="bg-white rounded-2xl p-10 text-center text-slate-400 text-sm shadow-sm">No papers yet. Click "Create Paper" to start.</div>';
      return;
    }
    el.innerHTML = snap.docs.map(doc => {
      const p = doc.data();
      const statusBadge = p.status === 'published'
        ? '<span class="px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold">Published</span>'
        : '<span class="px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs font-semibold">Draft</span>';
      const openBadge = p.assignedTo?.length
        ? `<span class="px-2.5 py-1 rounded-full bg-slate-100 text-slate-500 text-xs">${p.assignedTo.length} student${p.assignedTo.length > 1 ? 's' : ''}</span>`
        : '';
      const pdfBadge = p.pdfUrl
        ? `<a href="${p.pdfUrl}" target="_blank" class="flex items-center gap-1 px-2.5 py-1 rounded-full bg-red-100 text-red-600 text-xs font-semibold hover:bg-red-200">
            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M4 18h12V8l-4-4H4v14z"/></svg>PDF</a>`
        : '';
      return `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                <h4 class="font-semibold text-slate-800">${p.title}</h4>
                ${statusBadge}${openBadge}${pdfBadge}
              </div>
              <div class="flex items-center gap-4 text-xs text-slate-500">
                <span>${p.questionIds?.length || 0} questions</span>
                <span>${p.totalMarks || 0} marks</span>
                ${p.duration ? `<span>⏱ ${p.duration} min</span>` : ''}
              </div>
            </div>
            <div class="flex gap-2 flex-shrink-0">
              ${p.status === 'draft'
                ? `<button onclick="togglePublish('${doc.id}','published')" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-xs font-semibold hover:bg-emerald-700">Publish</button>`
                : `<button onclick="togglePublish('${doc.id}','draft')" class="px-3 py-1.5 border border-slate-200 text-slate-600 rounded-lg text-xs font-semibold hover:bg-slate-50">Unpublish</button>`}
              <a href="../student/exam.html?paperId=${doc.id}&preview=true" target="_blank"
                class="p-2 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-xl" title="Preview as student">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </a>
              <button onclick="editPaper('${doc.id}')" class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
              <button onclick="deletePaper('${doc.id}')" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Create / Edit modal ───────────────────────────────────────────
  async function openCreateModal(paper = null, paperId = null) {
    editingPaperId = paperId;
    selectedQIds   = new Set(paper?.questionIds || []);
    selectedSIds   = new Set(paper?.assignedTo  || []);
    pendingPdfFile = null;
    existingPdfUrl = paper?.pdfUrl || null;

    document.getElementById('paperModalTitle').textContent = paper ? 'Edit Paper' : 'Create Paper';
    document.getElementById('pTitle').value    = paper?.title    || '';
    document.getElementById('pDuration').value = paper?.duration || '';
    document.getElementById('pdfLink').value   = paper?.pdfUrl && !paper.pdfUrl.includes('firebasestorage') ? paper.pdfUrl : '';
    document.getElementById('pdfFileName').textContent = 'Upload PDF file…';
    document.getElementById('pdfFileInput').value = '';
    document.getElementById('pError').classList.add('hidden');
    document.getElementById('assignAll').checked = false;
    document.getElementById('paperModal').classList.remove('hidden');

    // Show existing PDF if any
    const wrap = document.getElementById('pdfCurrentWrap');
    if (existingPdfUrl) {
      document.getElementById('pdfCurrentLabel').textContent = 'Current PDF attached';
      wrap.classList.remove('hidden');
    } else { wrap.classList.add('hidden'); }

    const [qSnap, sSnap, topicSnap, setSnap] = await Promise.all([
      db.collection('exam_questions').orderBy('order').get().catch(() => db.collection('exam_questions').get()),
      db.collection('exam_whitelist').where('registered', '==', true).get(),
      db.collection('exam_topics').orderBy('order').get(),
      db.collection('exam_question_sets').orderBy('order').get(),
    ]);
    allQuestions = qSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allStudents  = sSnap.docs.map(d => ({ id: d.data().userId, ...d.data() }));
    allTopics    = topicSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allSets      = setSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Quick-add topic dropdown
    const qt = document.getElementById('quickTopicSel');
    qt.innerHTML = '<option value="">Select topic…</option>' +
      allTopics.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    document.getElementById('quickSetSel').innerHTML = '<option value="">Select set…</option>';

    // Individual picker topic filter
    const tf = document.getElementById('pTopicFilter');
    tf.innerHTML = '<option value="">All topics</option>' +
      allTopics.map(t => `<option value="${t.id}">${t.name}</option>`).join('');

    renderQuestionPicker(allQuestions);
    renderStudentPicker();
  }

  function closeCreateModal() {
    document.getElementById('paperModal').classList.add('hidden');
    editingPaperId = null;
  }

  // ── Quick-add whole set ───────────────────────────────────────────
  function onQuickTopicChange() {
    const topicId = document.getElementById('quickTopicSel').value;
    const setSel  = document.getElementById('quickSetSel');
    const sets    = allSets.filter(s => s.topicId === topicId);
    setSel.innerHTML = '<option value="">Select set…</option>' +
      sets.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }

  function addWholeSet() {
    const topicId = document.getElementById('quickTopicSel').value;
    const setId   = document.getElementById('quickSetSel').value;
    if (!topicId || !setId) { alert('Please select a topic and set first.'); return; }
    const qs = allQuestions.filter(q => q.topicId === topicId && q.setId === setId);
    if (qs.length === 0) { alert('No questions found in this set.'); return; }
    qs.forEach(q => selectedQIds.add(q.id));
    renderQuestionPicker(allQuestions); // refresh to show checked state
    // Scroll picker to show newly selected questions
    document.getElementById('questionPicker').scrollTop = 0;
  }

  // ── Question picker ───────────────────────────────────────────────
  function filterModalQuestions() {
    const topicId = document.getElementById('pTopicFilter').value;
    renderQuestionPicker(topicId ? allQuestions.filter(q => q.topicId === topicId) : allQuestions);
  }

  function renderQuestionPicker(questions) {
    const topicMap = Object.fromEntries(allTopics.map(t => [t.id, t.name]));
    const setMap   = Object.fromEntries(allSets.map(s => [s.id, s.name]));
    const el = document.getElementById('questionPicker');
    if (questions.length === 0) {
      el.innerHTML = '<div class="p-4 text-center text-slate-400 text-sm">No questions found.</div>';
      updateSelectionCount(); return;
    }
    el.innerHTML = questions.map(q => {
      const checked  = selectedQIds.has(q.id);
      const badge    = q.type === 'mcq'
        ? '<span class="text-blue-600 text-xs font-semibold">MCQ</span>'
        : '<span class="text-purple-600 text-xs font-semibold">Structured</span>';
      const location = q.topicId ? `<span class="text-xs text-slate-400">${topicMap[q.topicId] || ''} › ${setMap[q.setId] || ''}</span>` : '';
      const rawText  = (q.questionText || '').replace(/<[^>]+>/g, '').replace(/\{[\w|]+\}/g, '').trim();
      return `
        <label class="flex items-start gap-3 px-4 py-3 cursor-pointer hover:bg-slate-50 ${checked ? 'bg-indigo-50' : ''}">
          <input type="checkbox" value="${q.id}" onchange="toggleQ('${q.id}', this)" ${checked ? 'checked' : ''}
            class="w-4 h-4 text-indigo-600 rounded mt-0.5 flex-shrink-0">
          <div class="flex-1 min-w-0">
            <p class="text-sm text-slate-800 truncate">${rawText || '(no text)'}</p>
            <div class="flex items-center gap-2 mt-0.5">${badge}${location}
              <span class="text-xs text-slate-400">${q.totalMarks || 1} mark${(q.totalMarks||1)>1?'s':''}</span>
            </div>
          </div>
        </label>`;
    }).join('');
    updateSelectionCount();
  }

  function toggleQ(id, cb) {
    selectedQIds.has(id) ? selectedQIds.delete(id) : selectedQIds.add(id);
    cb.closest('label').classList.toggle('bg-indigo-50', selectedQIds.has(id));
    updateSelectionCount();
  }

  function updateSelectionCount() {
    const selected = allQuestions.filter(q => selectedQIds.has(q.id));
    document.getElementById('selectedCount').textContent = selected.length;
    document.getElementById('selectedMarks').textContent = selected.reduce((s, q) => s + (q.totalMarks || 1), 0);
  }

  // ── Student picker ────────────────────────────────────────────────
  function renderStudentPicker() {
    const el = document.getElementById('studentPicker');
    if (allStudents.length === 0) {
      el.innerHTML = '<div class="p-4 text-center text-slate-400 text-sm">No registered students yet.</div>';
      return;
    }
    el.innerHTML = allStudents.map(s => `
      <label class="flex items-center gap-3 px-4 py-2.5 cursor-pointer hover:bg-slate-50">
        <input type="checkbox" class="student-cb w-4 h-4 text-indigo-600 rounded"
          value="${s.id}" onchange="toggleS('${s.id}')" ${selectedSIds.has(s.id) ? 'checked' : ''}>
        <span class="text-sm text-slate-800">${s.name}</span>
        <span class="text-xs text-slate-400">${s.email}</span>
      </label>`).join('');
  }

  function toggleS(id) { selectedSIds.has(id) ? selectedSIds.delete(id) : selectedSIds.add(id); }

  function toggleAssignAll() {
    const all = document.getElementById('assignAll').checked;
    document.querySelectorAll('.student-cb').forEach(cb => {
      cb.checked = all;
      all ? selectedSIds.add(cb.value) : selectedSIds.delete(cb.value);
    });
    if (all) allStudents.forEach(s => selectedSIds.add(s.id));
    else selectedSIds.clear();
  }

  // ── PDF helpers ───────────────────────────────────────────────────
  function onPdfFileChange(input) {
    pendingPdfFile = input.files[0] || null;
    document.getElementById('pdfFileName').textContent = pendingPdfFile ? pendingPdfFile.name : 'Upload PDF file…';
    if (pendingPdfFile) document.getElementById('pdfLink').value = '';
  }

  function clearPdf() {
    existingPdfUrl = null;
    pendingPdfFile = null;
    document.getElementById('pdfFileInput').value = '';
    document.getElementById('pdfFileName').textContent = 'Upload PDF file…';
    document.getElementById('pdfLink').value = '';
    document.getElementById('pdfCurrentWrap').classList.add('hidden');
  }

  async function resolvePdfUrl() {
    const link = document.getElementById('pdfLink').value.trim();
    if (link) return link;
    if (pendingPdfFile) {
      const path = `exam-papers/${Date.now()}_${pendingPdfFile.name}`;
      const ref  = storage.ref(path);
      await ref.put(pendingPdfFile);
      return await ref.getDownloadURL();
    }
    return existingPdfUrl || null;
  }

  // ── Save paper ────────────────────────────────────────────────────
  async function savePaper(status) {
    const title    = document.getElementById('pTitle').value.trim();
    const duration = parseInt(document.getElementById('pDuration').value) || null;
    const errEl    = document.getElementById('pError');
    errEl.classList.add('hidden');

    if (!title) { errEl.textContent = 'Please enter a paper title.'; errEl.classList.remove('hidden'); return; }
    if (selectedQIds.size === 0 && !pendingPdfFile && !document.getElementById('pdfLink').value.trim() && !existingPdfUrl) {
      errEl.textContent = 'Please select at least one question or attach a PDF.'; errEl.classList.remove('hidden'); return;
    }
    if (selectedSIds.size === 0 && status === 'published') {
      errEl.textContent = 'Please assign to at least one student before publishing.'; errEl.classList.remove('hidden'); return;
    }

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      const pdfUrl = await resolvePdfUrl();
      const qIds   = [...selectedQIds];
      const totalMarks = allQuestions.filter(q => qIds.includes(q.id)).reduce((s, q) => s + (q.totalMarks||1), 0);

      const data = {
        title, status, duration, totalMarks,
        questionIds: qIds,
        assignedTo:  [...selectedSIds],
        pdfUrl:      pdfUrl || null,
        updatedAt:   firebase.firestore.FieldValue.serverTimestamp(),
      };

      if (editingPaperId) {
        await db.collection('exam_papers').doc(editingPaperId).update(data);
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('exam_papers').add(data);
      }
      closeCreateModal();
      loadPapers();
    } catch (ex) {
      errEl.textContent = ex.message; errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.textContent = 'Publish Paper';
    }
  }

  async function editPaper(id) {
    const doc = await db.collection('exam_papers').doc(id).get();
    openCreateModal(doc.data(), id);
  }

  async function togglePublish(id, status) {
    const snap = await db.collection('exam_papers').doc(id).get();
    const p    = snap.data();
    await db.collection('exam_papers').doc(id).update({ status });
    loadPapers();
  }

  async function deletePaper(id) {
    if (!confirm('Delete this paper? Student submissions will be kept.')) return;
    await db.collection('exam_papers').doc(id).delete();
    loadPapers();
  }
</script>
</body>
