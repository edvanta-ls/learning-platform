<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChemExam — Questions</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/teacher-nav.js"></script>
</head>
<body class="bg-slate-100">
<div class="flex h-screen">
  <aside id="teacher-sidebar" class="w-64 flex-shrink-0 hidden md:block"></aside>
  <main class="flex-1 overflow-auto">
    <!-- Top bar -->
    <div class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <h2 class="text-xl font-bold text-slate-800">Question Bank</h2>
        <select id="filterTopic" onchange="applyFilter()"
          class="px-3 py-2 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
          <option value="">All topics</option>
        </select>
        <select id="filterType" onchange="applyFilter()"
          class="px-3 py-2 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
          <option value="">All types</option>
          <option value="mcq">MCQ</option>
          <option value="structured">Structured</option>
        </select>
      </div>
      <button onclick="openModal()"
        class="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 text-sm font-semibold transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Question
      </button>
    </div>

    <div class="p-8">
      <div id="questionList" class="space-y-4">
        <div class="bg-white rounded-2xl p-8 text-center text-slate-400 text-sm shadow-sm">Loading…</div>
      </div>
    </div>
  </main>
</div>

<!-- Add/Edit Question Modal -->
<div id="qModal" class="hidden fixed inset-0 bg-black/50 flex items-start justify-center z-50 p-4 overflow-y-auto">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl my-8">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h3 id="modalTitle" class="text-lg font-semibold text-slate-800">Add Question</h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="p-6 space-y-5">
      <!-- Question type toggle -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Question type</label>
        <div class="flex rounded-xl border border-slate-200 overflow-hidden">
          <button id="typeMcq" onclick="setType('mcq')"
            class="flex-1 py-2.5 text-sm font-semibold transition-colors bg-indigo-600 text-white">
            MCQ (Multiple Choice)
          </button>
          <button id="typeStructured" onclick="setType('structured')"
            class="flex-1 py-2.5 text-sm font-semibold transition-colors bg-white text-slate-600 hover:bg-slate-50">
            Structured
          </button>
        </div>
      </div>

      <!-- Topic -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Topic</label>
          <input type="text" id="qTopic" list="topicSuggestions"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm"
            placeholder="e.g. Organic Chemistry">
          <datalist id="topicSuggestions"></datalist>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Total marks</label>
          <input type="number" id="qMarks" min="1" value="1"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm">
        </div>
      </div>

      <!-- Question text -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Question text</label>
        <textarea id="qText" rows="3"
          class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm resize-none"
          placeholder="Enter the question here…"></textarea>
      </div>

      <!-- Question image -->
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Question image (optional)</label>
        <div id="imgDropZone" onclick="document.getElementById('qImage').click()"
          class="border-2 border-dashed border-slate-200 rounded-xl p-6 text-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-all">
          <svg class="w-8 h-8 text-slate-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <p class="text-slate-400 text-sm">Click to upload image, or drag and drop</p>
          <p class="text-slate-300 text-xs mt-1">PNG, JPG, GIF up to 10 MB</p>
        </div>
        <input type="file" id="qImage" accept="image/*" class="hidden" onchange="previewImage(this)">
        <div id="imgPreview" class="hidden mt-3 relative">
          <img id="previewImg" class="rounded-xl max-h-48 object-contain border border-slate-200">
          <button type="button" onclick="clearImage()"
            class="absolute top-2 right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold hover:bg-red-600">✕</button>
        </div>
        <input type="hidden" id="existingImageUrl">
      </div>

      <!-- MCQ options -->
      <div id="mcqSection" class="space-y-3">
        <label class="block text-sm font-medium text-slate-700">Answer options</label>
        <div class="space-y-2">
          <div class="flex items-center gap-3">
            <input type="radio" name="correct" value="A" class="w-4 h-4 text-indigo-600 flex-shrink-0">
            <span class="text-sm font-semibold text-slate-600 w-4">A</span>
            <input type="text" id="optA"
              class="flex-1 px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
              placeholder="Option A">
          </div>
          <div class="flex items-center gap-3">
            <input type="radio" name="correct" value="B" class="w-4 h-4 text-indigo-600 flex-shrink-0">
            <span class="text-sm font-semibold text-slate-600 w-4">B</span>
            <input type="text" id="optB"
              class="flex-1 px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
              placeholder="Option B">
          </div>
          <div class="flex items-center gap-3">
            <input type="radio" name="correct" value="C" class="w-4 h-4 text-indigo-600 flex-shrink-0">
            <span class="text-sm font-semibold text-slate-600 w-4">C</span>
            <input type="text" id="optC"
              class="flex-1 px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
              placeholder="Option C">
          </div>
          <div class="flex items-center gap-3">
            <input type="radio" name="correct" value="D" class="w-4 h-4 text-indigo-600 flex-shrink-0">
            <span class="text-sm font-semibold text-slate-600 w-4">D</span>
            <input type="text" id="optD"
              class="flex-1 px-3 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm"
              placeholder="Option D">
          </div>
        </div>
        <p class="text-xs text-slate-400">Select the radio button next to the correct answer.</p>
      </div>

      <!-- Structured marking scheme -->
      <div id="structuredSection" class="hidden space-y-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Marking scheme</label>
          <textarea id="qScheme" rows="5"
            class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-800 text-sm resize-none"
            placeholder="List each marking point on a new line, e.g.:&#10;• Covalent bond formed between non-metals (1 mark)&#10;• Shared pair of electrons (1 mark)&#10;• Each atom achieves stable electron configuration (1 mark)"></textarea>
          <p class="text-xs text-slate-400 mt-1">This is used by AI to suggest marks. Be specific per point.</p>
        </div>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" id="allowImageUpload" class="w-4 h-4 text-indigo-600 rounded">
          <span class="text-sm text-slate-700">Allow students to upload an image with their answer</span>
        </label>
      </div>

      <div id="qError" class="hidden text-sm text-red-600 bg-red-50 px-4 py-3 rounded-xl"></div>

      <div class="flex gap-3 pt-2">
        <button onclick="closeModal()"
          class="flex-1 py-3 border border-slate-200 text-slate-600 rounded-xl font-semibold hover:bg-slate-50 text-sm">
          Cancel
        </button>
        <button onclick="saveQuestion()"
          class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 text-sm transition-colors" id="saveBtn">
          Save Question
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let allQuestions = [];
  let editingId = null;
  let currentType = 'mcq';
  let topics = new Set();

  initTeacherPage('questions').then(() => {
    loadMarkingBadge();
    loadQuestions();
  });

  async function loadQuestions() {
    const snap = await db.collection('exam_questions').orderBy('createdAt', 'desc').get();
    allQuestions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    allQuestions.forEach(q => { if (q.topic) topics.add(q.topic); });
    rebuildTopicFilter();
    applyFilter();
  }

  function rebuildTopicFilter() {
    const sel = document.getElementById('filterTopic');
    const dl  = document.getElementById('topicSuggestions');
    const existing = sel.value;
    sel.innerHTML = '<option value="">All topics</option>';
    dl.innerHTML = '';
    topics.forEach(t => {
      sel.insertAdjacentHTML('beforeend', `<option value="${t}">${t}</option>`);
      dl.insertAdjacentHTML('beforeend', `<option value="${t}">`);
    });
    sel.value = existing;
  }

  function applyFilter() {
    const topic = document.getElementById('filterTopic').value;
    const type  = document.getElementById('filterType').value;
    let filtered = allQuestions;
    if (topic) filtered = filtered.filter(q => q.topic === topic);
    if (type)  filtered = filtered.filter(q => q.type === type);
    renderQuestions(filtered);
  }

  function renderQuestions(questions) {
    const el = document.getElementById('questionList');
    if (questions.length === 0) {
      el.innerHTML = '<div class="bg-white rounded-2xl p-10 text-center text-slate-400 text-sm shadow-sm">No questions found. Click "Add Question" to create your first one.</div>';
      return;
    }
    el.innerHTML = questions.map(q => {
      const typeBadge = q.type === 'mcq'
        ? '<span class="px-2.5 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold">MCQ</span>'
        : '<span class="px-2.5 py-1 rounded-full bg-purple-100 text-purple-700 text-xs font-semibold">Structured</span>';
      const img = q.imageUrl
        ? `<img src="${q.imageUrl}" class="mt-3 max-h-32 rounded-xl border border-slate-200 object-contain">`
        : '';
      return `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap mb-2">
                ${typeBadge}
                ${q.topic ? `<span class="px-2.5 py-1 rounded-full bg-slate-100 text-slate-600 text-xs">${q.topic}</span>` : ''}
                <span class="px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 text-xs font-semibold">${q.totalMarks || 1} mark${(q.totalMarks||1)>1?'s':''}</span>
              </div>
              <p class="text-slate-800 text-sm leading-relaxed">${q.questionText || ''}</p>
              ${img}
              ${q.type === 'mcq' && q.options ? `
                <div class="mt-3 grid grid-cols-2 gap-1.5">
                  ${['A','B','C','D'].map(l => `
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg ${q.correctAnswer === l ? 'bg-emerald-50 border border-emerald-200' : 'bg-slate-50 border border-slate-100'}">
                      <span class="text-xs font-bold ${q.correctAnswer === l ? 'text-emerald-600' : 'text-slate-400'}">${l}</span>
                      <span class="text-xs text-slate-700 truncate">${q.options[l] || ''}</span>
                    </div>`).join('')}
                </div>` : ''}
              ${q.type === 'structured' && q.markingScheme ? `
                <details class="mt-3">
                  <summary class="text-xs text-indigo-600 font-medium cursor-pointer hover:underline">View marking scheme</summary>
                  <p class="mt-2 text-xs text-slate-600 bg-indigo-50 rounded-xl p-3 whitespace-pre-line">${q.markingScheme}</p>
                </details>` : ''}
            </div>
            <div class="flex gap-2 flex-shrink-0">
              <button onclick="editQuestion('${q.id}')"
                class="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
              </button>
              <button onclick="deleteQuestion('${q.id}')"
                class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function setType(t) {
    currentType = t;
    document.getElementById('mcqSection').classList.toggle('hidden', t !== 'mcq');
    document.getElementById('structuredSection').classList.toggle('hidden', t !== 'structured');
    document.getElementById('typeMcq').className = `flex-1 py-2.5 text-sm font-semibold transition-colors ${t === 'mcq' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'}`;
    document.getElementById('typeStructured').className = `flex-1 py-2.5 text-sm font-semibold transition-colors ${t === 'structured' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 hover:bg-slate-50'}`;
    if (t === 'mcq') document.getElementById('qMarks').value = 1;
  }

  function openModal(q = null) {
    editingId = q ? q.id : null;
    document.getElementById('modalTitle').textContent = q ? 'Edit Question' : 'Add Question';
    document.getElementById('qText').value   = q?.questionText || '';
    document.getElementById('qTopic').value  = q?.topic || '';
    document.getElementById('qMarks').value  = q?.totalMarks || 1;
    document.getElementById('qScheme').value = q?.markingScheme || '';
    document.getElementById('allowImageUpload').checked = q?.allowImageUpload || false;
    document.getElementById('existingImageUrl').value = q?.imageUrl || '';
    document.getElementById('qError').classList.add('hidden');
    clearImagePreview();
    if (q?.imageUrl) {
      document.getElementById('imgPreview').classList.remove('hidden');
      document.getElementById('previewImg').src = q.imageUrl;
    }
    setType(q?.type || 'mcq');
    if (q?.type === 'mcq' && q.options) {
      document.getElementById('optA').value = q.options.A || '';
      document.getElementById('optB').value = q.options.B || '';
      document.getElementById('optC').value = q.options.C || '';
      document.getElementById('optD').value = q.options.D || '';
      const radio = document.querySelector(`input[name="correct"][value="${q.correctAnswer}"]`);
      if (radio) radio.checked = true;
    } else {
      ['optA','optB','optC','optD'].forEach(id => document.getElementById(id).value = '');
      document.querySelectorAll('input[name="correct"]').forEach(r => r.checked = false);
    }
    document.getElementById('qModal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('qModal').classList.add('hidden');
    editingId = null;
  }

  function editQuestion(id) {
    const q = allQuestions.find(x => x.id === id);
    if (q) openModal(q);
  }

  async function deleteQuestion(id) {
    if (!confirm('Delete this question? It will be removed from all papers.')) return;
    await db.collection('exam_questions').doc(id).delete();
    loadQuestions();
  }

  function previewImage(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('previewImg').src = e.target.result;
      document.getElementById('imgPreview').classList.remove('hidden');
      document.getElementById('imgDropZone').classList.add('hidden');
    };
    reader.readAsDataURL(input.files[0]);
  }

  function clearImage() {
    clearImagePreview();
    document.getElementById('existingImageUrl').value = '';
  }

  function clearImagePreview() {
    document.getElementById('qImage').value = '';
    document.getElementById('imgPreview').classList.add('hidden');
    document.getElementById('imgDropZone').classList.remove('hidden');
    document.getElementById('previewImg').src = '';
  }

  async function saveQuestion() {
    const btn     = document.getElementById('saveBtn');
    const errEl   = document.getElementById('qError');
    const text    = document.getElementById('qText').value.trim();
    const topic   = document.getElementById('qTopic').value.trim();
    const marks   = parseInt(document.getElementById('qMarks').value) || 1;
    errEl.classList.add('hidden');

    if (!text) { errEl.textContent = 'Please enter the question text.'; errEl.classList.remove('hidden'); return; }

    let data = { questionText: text, topic, totalMarks: marks, type: currentType };

    if (currentType === 'mcq') {
      const opts = {
        A: document.getElementById('optA').value.trim(),
        B: document.getElementById('optB').value.trim(),
        C: document.getElementById('optC').value.trim(),
        D: document.getElementById('optD').value.trim(),
      };
      const correct = document.querySelector('input[name="correct"]:checked')?.value;
      if (!opts.A || !opts.B || !opts.C || !opts.D) {
        errEl.textContent = 'Please fill in all four answer options.'; errEl.classList.remove('hidden'); return;
      }
      if (!correct) {
        errEl.textContent = 'Please select the correct answer.'; errEl.classList.remove('hidden'); return;
      }
      data.options = opts;
      data.correctAnswer = correct;
    } else {
      const scheme = document.getElementById('qScheme').value.trim();
      if (!scheme) { errEl.textContent = 'Please enter the marking scheme.'; errEl.classList.remove('hidden'); return; }
      data.markingScheme = scheme;
      data.allowImageUpload = document.getElementById('allowImageUpload').checked;
    }

    btn.disabled = true; btn.textContent = 'Saving…';

    try {
      // Handle image upload
      const file = document.getElementById('qImage').files[0];
      if (file) {
        const path = `exam-images/questions/${Date.now()}_${file.name}`;
        const ref  = storage.ref(path);
        await ref.put(file);
        data.imageUrl = await ref.getDownloadURL();
      } else {
        data.imageUrl = document.getElementById('existingImageUrl').value || null;
      }

      if (editingId) {
        await db.collection('exam_questions').doc(editingId).update(data);
      } else {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('exam_questions').add(data);
      }

      if (topic) topics.add(topic);
      closeModal();
      loadQuestions();
    } catch (ex) {
      errEl.textContent = ex.message; errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.textContent = 'Save Question';
    }
  }
</script>
</body>
</html>
